[main]
font=Monaspace Krypton Frozen:size=14, JetBrainsMono Nerd Font:size=14
dpi-aware=no
prompt="Search: " 
icon-theme=Papirus-Dark
icons-enabled=yes
fields=filename,name,generic
password-character=*
match-mode=fzf
terminal=foot -e

anchor=center
lines=10
width=40
horizontal-pad=40
vertical-pad=20
inner-pad=10

[colors]
background=1e1e2eff
text=cdd6f4ff
match=f38ba8ff
selection=585b70ff
selection-text=cdd6f4ff
border=89b4faff

[border]
width=2
radius=15
